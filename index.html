<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일본 규슈현(나가사키) 가족 여행 🌸</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; background: #f3f4f6; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .day-card-header { transition: opacity 0.15s; }
    .day-card-header:active { opacity: 0.75; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── 이동 구간 ── */
    const Drive = ({ dist, time }) => (
      <div className="flex items-center gap-2 my-3 ml-10 px-3 py-2 rounded-lg border border-dashed border-gray-200 bg-gray-50 text-xs text-gray-400">
        <i className="fa-solid fa-car-side text-gray-300 shrink-0"></i>
        <span className="flex-1">{dist}</span>
        <span className="text-gray-300">|</span>
        <span className="shrink-0">{time}</span>
      </div>
    );

    /* ── 섹션 구분선 ── */
    const SLabel = ({ label }) => (
      <div className="flex items-center gap-2 my-4 ml-10">
        <div className="h-px flex-1 bg-gray-100" />
        <span className="text-xs text-gray-300 font-medium px-2">{label}</span>
        <div className="h-px flex-1 bg-gray-100" />
      </div>
    );

    /* ── 타임라인 아이템 ── */
    const TL = ({ time, title, sub, icon, ic='text-gray-500', bc='border-gray-100', accent=false, drive, last=false }) => (
      <>
        <div className={`flex relative z-10 ${last && !drive ? '' : 'mb-1'}`}>
          <div className={`bg-white rounded-full p-1 border-2 ${bc} shadow-sm z-10 mr-4 h-8 w-8 flex items-center justify-center shrink-0`}>
            <i className={`fa-solid ${icon} ${ic} text-xs`}></i>
          </div>
          <div className="flex-1 pt-0.5">
            <div className="flex items-end gap-2 mb-0.5 flex-wrap">
              <span className={`font-bold text-lg leading-none ${accent ? 'text-purple-700' : 'text-gray-800'}`}>{time}</span>
              <span className={`font-bold text-sm ${accent ? 'text-purple-700' : 'text-gray-700'}`}>{title}</span>
            </div>
            {sub && <p className="text-gray-400 text-xs mt-0.5 leading-relaxed">{sub}</p>}
          </div>
        </div>
        {drive && <Drive dist={drive.dist} time={drive.time} />}
      </>
    );

    /* ════════════════════════════════
       일정 데이터
    ════════════════════════════════ */
    const days = [
      /* ─ 1일차 ─ */
      {
        id: 'd1',
        label: '1일차',
        date: '5.21 (목)',
        theme: '입국 · 다케오 · 아리타',
        /* 헤더 아이콘 구성 */
        headerIcons: [
          { icon: 'fa-plane', color: 'text-blue-400', bg: 'bg-blue-50' },
          { icon: 'fa-book-open', color: 'text-amber-500', bg: 'bg-amber-50' },
          { icon: 'fa-jar', color: 'text-teal-500', bg: 'bg-teal-50' },
          { icon: 'fa-hot-tub-person', color: 'text-indigo-400', bg: 'bg-indigo-50' },
        ],
        headerGrad: 'from-violet-500 to-purple-600',
        body: () => (<>
          <TL time="06:30" title="인천(ICN) 출발" sub="아시아나 OZ132 · T1"
            icon="fa-plane" ic="text-blue-500"
            drive={{ dist: '인천 → 후쿠오카  약 1,100km', time: '1h 25m' }} />
          <TL time="07:55" title="후쿠오카(FUK) 도착" sub="국제선 터미널 · 입국 수속"
            icon="fa-location-dot" ic="text-red-500" />
          <TL time="08:00" title="입국 + ORIX 렌터카 수령" sub="공항 카운터 수속 (08:00 ~ 09:00)"
            icon="fa-car" ic="text-gray-600"
            drive={{ dist: '후쿠오카 → 다케오  약 70km', time: '약 1시간 20분' }} />

          <TL time="10:20" title="다케오 시립 도서관 & 스타벅스" sub="츠타야 운영 감성 도서관 · 커피 ☕  (10:20 ~ 11:20)"

          <SLabel label="점심" />

            icon="fa-utensils" ic="text-orange-500"

          <SLabel label="우레시노 체크인" />
          <TL time="15:00" title="카페 / 자유 휴식" sub="우레시노 시내 카페 또는 시라스나 족욕  (15:00 ~ 16:00)"
            icon="fa-mug-hot" ic="text-amber-500" />
          <TL time="16:30" title="와타야 베쏘 체크인 🏯" sub="우레시노 온천 대표 고급 료칸"

          <TL time="18:30" title="저녁 식사" sub="료칸 가이세키 또는 인근 식당  (18:30 ~ 20:00)"
            icon="fa-utensils" ic="text-orange-500" />

            icon="fa-moon" ic="text-indigo-300" last />
        </>)
      },

      /* ─ 2일차 ─ */
      {
        id: 'd2',
        label: '2일차',
        date: '5.22 (금)',
        theme: '사세보 · 하우스텐보스',
        headerIcons: [
          { icon: 'fa-water', color: 'text-cyan-500', bg: 'bg-cyan-50' },
          { icon: 'fa-burger', color: 'text-orange-500', bg: 'bg-orange-50' },
          { icon: 'fa-fort-awesome', color: 'text-indigo-500', bg: 'bg-indigo-50' },
          { icon: 'fa-star', color: 'text-yellow-400', bg: 'bg-yellow-50' },
        ],
        headerGrad: 'from-rose-500 to-pink-600',
        body: () => (<>
          <TL time="08:00" title="기상" icon="fa-sun" ic="text-orange-400" />

            drive={{ dist: '사세보 → 하우스텐보스  약 15km', time: '약 25분' }} />

          <SLabel label="하우스텐보스" />
          <TL time="13:30" title="주차 및 입장 준비" sub="사전 구매 티켓 확인"
            icon="fa-ticket" ic="text-purple-500" />
          <TL time="14:00" title="낮 관광 🏰" sub="보트 · VR · 테마존 산책  (14:00 ~ 17:30)"

            icon="fa-mug-hot" ic="text-amber-500" />

            icon="fa-star" ic="text-yellow-500" bc="border-yellow-200" accent />
          <TL time="21:00" title="하우스텐보스 출발"
            icon="fa-car" ic="text-gray-600"

          <TL time="22:00" title="숙소 도착 · 취침" sub="와타야 베쏘 복귀"

          { icon: 'fa-fire-flame-curved', color: 'text-orange-500', bg: 'bg-orange-50' },
          { icon: 'fa-egg', color: 'text-amber-500', bg: 'bg-amber-50' },
          { icon: 'fa-dove', color: 'text-sky-500', bg: 'bg-sky-50' },
          { icon: 'fa-mountain', color: 'text-violet-500', bg: 'bg-violet-50' },
        ],
        headerGrad: 'from-teal-500 to-emerald-600',
        body: () => (<>
          <TL time="07:30" title="기상" icon="fa-sun" ic="text-orange-400" />
          <TL time="08:00" title="아침 식사" sub="호텔 조식  (08:00 ~ 08:30)"
            icon="fa-utensils" ic="text-orange-400"
            drive={{ dist: '우레시노 → 운젠  약 80km', time: '약 1시간 40분' }} />

          <SLabel label="운젠 관광" />
          <TL time="10:10" title="운젠 지옥 관광 🌋" sub="유황 분화구 대지옥 · 흰 연기 절경  (10:10 ~ 11:20)"
            icon="fa-fire-flame-curved" ic="text-orange-600" bc="border-orange-200" accent />
          <TL time="11:20" title="지옥공방 체험" sub="온천열로 찐 계란 · 온천 두부 맛보기  (11:20 ~ 12:00)"
            icon="fa-egg" ic="text-amber-500" bc="border-amber-200" />
          <TL time="12:00" title="점심 식사" sub="운젠 온천 마을 내 식당  (12:00 ~ 13:00)"
            icon="fa-utensils" ic="text-orange-500"
            drive={{ dist: '운젠 → 나가사키  약 40km', time: '약 1시간' }} />

          <SLabel label="나가사키 시내 관광" />
          <TL time="14:00" title="나가사키 도착" icon="fa-location-dot" ic="text-red-400" />
          <TL time="14:00" title="평화공원 or 글로버가든 (택2)" sub="🕊️ 평화공원 — 원폭기념관·평화기념상  /  🌿 글로버가든 — 항구 전망  (14:00 ~ 16:30)"
            icon="fa-dove" ic="text-sky-500" bc="border-sky-200" accent />
          <TL time="16:30" title="카페 휴식" sub="나가사키 시내 카페  (16:30 ~ 17:30)"
            icon="fa-mug-hot" ic="text-amber-500"
            drive={{ dist: '→ 이나사야마  약 10km', time: '약 30분 (산길)' }} />

          <SLabel label="이나사야마 야경" />
          <TL time="18:00" title="이나사야마 전망대 야경 🌃" sub="일본 3대 야경 · 나가사키항 파노라마  (18:00 ~ 19:00)"
            icon="fa-mountain" ic="text-violet-600" bc="border-violet-200" accent />
          <TL time="19:30" title="저녁 식사" sub="나가사키 짬뽕 · 카스테라 · 향토요리  (19:30 ~ 20:30)"
            icon="fa-utensils" ic="text-orange-500"
            drive={{ dist: '나가사키 → 우레시노  약 90km', time: '약 1시간 40분' }} />
          <TL time="22:00" title="숙소 도착 · 취침" sub="와타야 베쏘 복귀 · 마지막 온천 강추 🛁"
            icon="fa-bed" ic="text-indigo-400" last />
        </>)
      },

      /* ─ 4일차 ─ */
      {
        id: 'd4',
        label: '4일차',
        date: '5.24 (일)',
        theme: '후쿠오카 쇼핑 · 귀국',
        headerIcons: [
          { icon: 'fa-bag-shopping', color: 'text-pink-500', bg: 'bg-pink-50' },
          { icon: 'fa-bowl-food', color: 'text-orange-500', bg: 'bg-orange-50' },
          { icon: 'fa-car', color: 'text-gray-500', bg: 'bg-gray-100' },
          { icon: 'fa-plane-departure', color: 'text-blue-500', bg: 'bg-blue-50' },
        ],
        headerGrad: 'from-blue-500 to-sky-500',
        body: () => (<>
          <TL time="08:00" title="기상" icon="fa-sun" ic="text-orange-400" />
          <TL time="08:30" title="체크아웃 준비 + 아침" sub="와타야 베쏘 최종 체크아웃  (08:30 ~ 09:30)"
            icon="fa-bed" ic="text-indigo-500"
            drive={{ dist: '우레시노 → 후쿠오카  약 110km', time: '약 1시간 30분' }} />

          <SLabel label="후쿠오카 쇼핑" />
          <TL time="11:00" title="후쿠오카 도착" icon="fa-location-dot" ic="text-red-400" />
          <TL time="11:00" title="쇼핑 🛍️ — 캐널시티 or 텐진" sub="캐널시티 하카타 / 텐진 지하상가  (11:00 ~ 13:00)"
            icon="fa-bag-shopping" ic="text-pink-500" bc="border-pink-200" accent />
          <TL time="13:00" title="점심 식사" sub="하카타 라멘 · 명란 요리 · 우동  (13:00 ~ 14:00)"
            icon="fa-bowl-food" ic="text-orange-500"
            drive={{ dist: '→ 후쿠오카공항  약 5km', time: '약 15분' }} />

          <SLabel label="귀국" />
          <TL time="13:30" title="후쿠오카공항 도착 · 렌터카 반납" sub="ORIX 렌터카 공항점 반납"
            icon="fa-car" ic="text-gray-600" />
          <TL time="14:00" title="탑승 수속 · 출국 심사" sub="출국장 이동 · 면세점 쇼핑"
            icon="fa-passport" ic="text-green-600" />
          <TL time="16:25" title="후쿠오카(FUK) 출발 ✈️" sub="아시아나 OZ133 · 국제선 T"
            icon="fa-plane-departure" ic="text-blue-500" bc="border-blue-200" accent />
          <TL time="17:50" title="인천(ICN) 도착" sub="또 다른 그날을 기약하며 ☺"
            icon="fa-location-dot" ic="text-red-400" last />
        </>)
      }
    ];

    /* ════════════════════════════════
       메인 앱
    ════════════════════════════════ */
    function App() {
      const [tab, setTab] = useState('schedule');
      const [open, setOpen] = useState({ d1:true, d2:false, d3:false, d4:false });
      const toggle = id => setOpen(p => ({ ...p, [id]: !p[id] }));

      const GRAD = 'linear-gradient(135deg,#7c3aed 0%,#be185d 100%)';

      return (
        <div className="bg-gray-100 min-h-screen">
          <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-24 shadow-2xl border-x border-gray-200">

            {/* ── 헤더 ── */}
            <div className="text-white p-6 rounded-b-3xl shadow-lg"
              style={{ background:'linear-gradient(135deg,#7c3aed 0%,#be185d 55%,#f59e0b 100%)' }}>
              <div className="flex items-center gap-3 mb-4">
                <span className="text-4xl">🌸</span>
                <div>
                  <h1 className="text-xl font-bold tracking-tight">우레시노 & 나가사키</h1>
                  <p className="text-purple-100 text-sm">힐링 & 관광 가족여행</p>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2 text-xs">
                {[
                  ['fa-regular fa-calendar','2026.05.21 (목) – 05.24 (일)'],
                  ['fa-solid fa-moon','3박 4일'],
                  ['fa-solid fa-bed','와타야 베쏘 3박'],
                  ['fa-solid fa-route','후쿠오카 · 사세보 · 운젠 · 나가사키'],
                ].map(([ic,txt]) => (
                  <div key={txt} className="bg-white/15 rounded-xl px-3 py-2 flex items-center gap-2">
                    <i className={`${ic} text-yellow-200 shrink-0`}></i>
                    <span className="text-white leading-tight">{txt}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* ── 탭 ── */}
            <div className="flex px-4 mt-5 gap-2">
              {[['schedule','📅 상세 일정표'],['info','🗂 예약 정보']].map(([t,lbl]) => (
                <button key={t} onClick={() => setTab(t)}
                  className={`flex-1 py-3 font-bold rounded-xl transition text-sm shadow ${tab!==t ? 'bg-white text-gray-500' : ''}`}
                  style={tab===t ? { background:GRAD, color:'#fff' } : {}}>
                  {lbl}
                </button>
              ))}
            </div>

            <div className="p-4 mt-2">

              {/* ══ 일정 탭 ══ */}
              {tab === 'schedule' && (
                <div className="space-y-4">
                  {days.map(d => (
                    <div key={d.id}
                      className="bg-white rounded-2xl shadow-sm overflow-hidden"
                      style={{ border:'1.5px solid #e5e7eb' }}>

                      {/* ── 일정 카드 헤더 (아이콘 방식) ── */}
                      <div className="day-card-header cursor-pointer"
                        onClick={() => toggle(d.id)}>
                        {/* 그라데이션 배너 */}
                        <div className={`bg-gradient-to-r ${d.headerGrad} px-4 pt-4 pb-3`}>
                          <div className="flex items-center justify-between">
                            <div>
                              <div className="flex items-center gap-2 mb-1">
                                <span className="bg-white/25 text-white text-xs font-bold px-2.5 py-0.5 rounded-full">
                                  {d.label}
                                </span>
                                <span className="text-white font-bold text-base">{d.date}</span>
                              </div>
                              <p className="text-white/80 text-xs">{d.theme}</p>
                            </div>
                            <i className={`fa-solid fa-chevron-down text-white/70 text-sm transition-transform duration-300 ${open[d.id] ? 'rotate-180' : ''}`}></i>
                          </div>
                        </div>
